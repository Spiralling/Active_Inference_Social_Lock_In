experiment:
  name: E3_slow_drift
  description: >
    Slow ramp from paradigm 0 to paradigm 1 over 200 steps.
    The headline hysteresis experiment: agents with high paradigm inertia
    lag behind the drifting environment while open agents track it.

base:
  pomdp:
    n_paradigms: 2
    theta_vals: [0.0, 1.0]
    true_paradigm: 1
    x_grid: [0.1, 0.3, 0.5, 0.8, 1.0]
    n_o: 5
    q_reliability: 0.65
    world:
      schedule: ramp
      theta_star_pre: 0.0
      theta_star_post: 1.0
      schedule_t_shift: 50
      schedule_ramp_T: 200
  eps_crisis: 0.05
  D_c_normal: 0.9
  obs_x_index: 4
  n_agents: 80
  n_steps: 500
  use_theta_schedule: true
  graph_kind: watts_strogatz
  mean_degree: 4

sweep:
  eps_resolve: [0.01, 0.10, 0.30, 0.50, 0.70]
  social_mask: [0.0, 0.5, 1.0]

seeds: [0, 1, 2, 3, 4]

outputs:
  dir: experiments/results/E3
