experiment:
  name: E1_stationary
  description: >
    Stationary environment. Sweep paradigm inertia (eps_resolve) and social
    coupling (q_reliability) to map the regime: convergence vs capture.

base:
  pomdp:
    n_paradigms: 2
    theta_vals: [0.0, 1.0]
    true_paradigm: 1
    x_grid: [0.1, 0.3, 0.5, 0.8, 1.0]
    n_o: 5
    q_reliability: 0.65
  eps_crisis: 0.05
  eps_resolve: 0.30
  D_c_normal: 0.9
  obs_x_index: 4
  n_agents: 80
  n_steps: 300
  use_theta_schedule: false
  graph_kind: watts_strogatz
  mean_degree: 4

sweep:
  eps_resolve: [0.01, 0.10, 0.30, 0.50, 0.70, 0.90]
  q_reliability: [0.55, 0.65, 0.75, 0.85]

seeds: [0, 1, 2, 3, 4]

outputs:
  dir: experiments/results/E1
