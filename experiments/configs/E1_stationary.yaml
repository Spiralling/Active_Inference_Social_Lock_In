experiment:
  name: E1_stationary
  description: >
    Stationary environment, no social coupling. Isolates the theory-ladenness
    effect: eps_resolve controls how fast agents converge to truth when there
    is no social reinforcement to overcome.

base:
  pomdp:
    n_paradigms: 2
    theta_vals: [0.0, 1.0]
    true_paradigm: 1
    x_grid: [0.1, 0.3, 0.5, 0.8, 1.0]
    n_o: 5
    q_reliability: 0.55
  D_c_normal: 0.9
  eps_crisis: 0.05
  obs_x_index: 4
  n_agents: 40
  n_steps: 200
  use_theta_schedule: false
  graph_kind: watts_strogatz
  mean_degree: 4
  social_mask: 0.0

sweep:
  eps_resolve: [0.01, 0.05, 0.10, 0.20, 0.30, 0.50, 0.70, 0.90]
  eps_crisis: [0.05, 0.10, 0.20]

seeds: [0, 1, 2, 3, 4]

outputs:
  dir: experiments/results/E1
